name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o fasentneo-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fasentneo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: fasentneo-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build Go binary for Android
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o android/app/src/main/jniLibs/arm64-v8a/libfasentneo.so .

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.5

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fasentneo-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: [build-binaries, build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename artifacts
        run: |
          mv dist/fasentneo-android-apk/*.apk dist/fasentneo-android-arm64.apk 2>/dev/null || true
          find dist -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
